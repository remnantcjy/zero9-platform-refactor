<!doctype html>
<html lang="en">
<head>
    <title>Zero9</title>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">

    <link href="/css/common.css" rel="stylesheet">

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="/js/common.js"></script>

    <style>
        #login_main{display: flex; justify-content: center; align-items: center; min-height: calc(100vh - 400px);}
        #login_main .login_box{}
        #login_main .login_box h2{margin-bottom: 60px; text-align: center;}
        #login_main .login_box .input_box{}
        #login_main .login_box .input_box input{display: block; ;width: 350px; height: 32px}
        #login_main .login_box .input_box input + input{margin-top: 5px;}
        #login_main .login_box .btn{width: 100%; margin-top: 32px; padding: 16px 0;}
    </style>
</head>
<body>
    <main id="login_main" class="df_main">
        <div class="login_box">
            <h2>로그인</h2>

            <div class="input_box">
                <input id="id" type="text" placeholder="아이디">
                <input id="password" type="password" placeholder="비밀번호">
            </div>

            <button id="login_btn" class="btn" type="button">로그인</button>
        </div>
    </main>

    <script>
        // 이미 로그인된 상태면 메인으로
        if (existToken && !isExpired) {
            alert("이미 로그인 상태입니다.");

            location.href = "/main.html";
        }else{
            $("#login_btn").off("click").on("click", function () {

                const id = $("#id").val();
                const password = $("#password").val();

                if (!id || !password) {
                    alert("아이디와 비밀번호를 입력하세요.");
                    return;
                }

                fetch("/zero9/auth/login", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        loginId: id,
                        password: password
                    })
                })
                    .then(response => {
                        if (!response.ok) {
                            throw new Error("HTTP 상태 오류: " + response.status);
                        }
                        return response.json();
                    })
                    .then(data => {
                        if (!data.success) {
                            alert(data.message || "로그인 실패");
                            return;
                        }

                        const token = data.data.token;
                        localStorage.setItem("accessToken", token);

                        alert("로그인 성공");
                        location.href = "/main.html";
                    })
                    .catch(error => {
                        console.error("로그인 에러:", error);
                        alert("로그인 중 오류가 발생했습니다.");
                    });
            });
        }
    </script>

</body>
</html>
